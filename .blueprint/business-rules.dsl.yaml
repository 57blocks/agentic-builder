  - id: PRIORITY-LOW
    name: "Low priority display"
    description: "Maps low priority tasks to the blue badge style."
    type: decision-table
    inputs:
      - { name: priority, type: string }
    output: { name: badgeColor, type: string }
    cases:
      - when: { priority: "low" }
        then: "blue"


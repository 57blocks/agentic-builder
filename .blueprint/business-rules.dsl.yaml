  - id: RULE-1
    name: "Enrollment deadline enforcement"
    description: "Blocks enrollment actions after the course deadline."
    type: decision-table
    inputs:
      - { name: enrollmentDeadlinePassed, type: string }
    output: { name: action, type: string }
    cases:
      - when: { enrollmentDeadlinePassed: "true" }
        then: "disable-enroll"
      - when: { }
        then: "allow-enroll"

  # PLACEHOLDER: thresholds inferred without authoritative source;
  # downstream codegen MUST preserve this comment and emit a TODO in code.
  - id: RULE-2
    name: "Class capacity enforcement"
    description: "Determines whether a group class is full and should move to waitlist."
    type: decision-table
    inputs:
      - { name: enrolled, type: number }
      - { name: capacity, type: number }
    output: { name: enrollmentState, type: string }
    cases:
      - when: { enrolled: ">=capacity" }
        then: "waitlist"
      - when: { }
        then: "enroll"

  # PLACEHOLDER: thresholds inferred without authoritative source;

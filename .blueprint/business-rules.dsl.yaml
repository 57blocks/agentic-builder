  - id: RULE-1
    name: "Enrollment deadline gate"
    description: "Disables enrollment actions once the deadline has passed."
    type: decision-table
    inputs:
      - { name: enrollmentClosed, type: boolean }
    output: { name: canEnroll, type: boolean }
    cases:
      - when: { enrollmentClosed: true }
        then: false
      - when: { }
        then: true

  # PLACEHOLDER: thresholds inferred from PRD rules without an authoritative boundary block;
  # downstream codegen MUST preserve this comment and emit a TODO in code.
  - id: RULE-2
    name: "Class capacity gate"
    description: "Routes full group classes into waitlist flow."
    type: decision-table
    inputs:
      - { name: enrolled, type: number }
      - { name: capacity, type: number }
    output: { name: enrollmentMode, type: string }
    cases:
      - when: { enrolled_gte_capacity: true }
        then: "waitlist"
      - when: { }
        then: "direct"


  - id: RULE-3
    name: "Policy re-sign enforcement"
    description: "Forces re-sign when the active policy version changes."
    type: decision-table
    inputs:
      - { name: signedVersion, type: string }
      - { name: activeVersion, type: string }
    output: { name: allowed, type: string }
    cases:
      - when: { signedVersion: "!=activeVersion" }
        then: "block-and-redirect"
      - when: { }
        then: "allow"


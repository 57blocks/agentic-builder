  - id: RULE-4
    name: "Refund window"
    description: "Allows refunds only within the configured refund window."
    type: piecewise-linear
    inputUnit: "days"
    outputRange: [0, 1]
    segments:
      - { from: 0, to: 14, outputFrom: 1, outputTo: 1 }
      - { from: 14, to: 3650, outputFrom: 0, outputTo: 0 }


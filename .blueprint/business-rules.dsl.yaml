version: 1
rules:
  # PLACEHOLDER: thresholds below are authoritative only where copied from the PRD;
  # any non-verbatim fallback thresholds must preserve this comment in codegen.
  - id: RQ-1-NORM
    name: "First Contentful Paint target"
    description: "FCP must be <= 1.5s."
    type: decision-table
    inputs:
      - { name: value, type: number }
    output: { name: passes, type: boolean }
    cases:
      - when: { value: 1.5 }
        then: true
      - when: { }
        then: false
  - id: RQ-2-NORM
    name: "Largest Contentful Paint target"
    description: "LCP must be <= 2.5s."
    type: decision-table
    inputs:
      - { name: value, type: number }
    output: { name: passes, type: boolean }
    cases:
      - when: { value: 2.5 }
        then: true
      - when: { }
        then: false
  - id: RQ-3-NORM
    name: "Cumulative Layout Shift target"

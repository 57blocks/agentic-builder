  - id: RQ-1
    name: "Reserve composition extraction confidence"
    description: "Maps extraction confidence into a normalized review contribution."
    type: piecewise-linear
    inputUnit: "ratio"
    outputRange: [0, 100]
    segments:
      - { from: 0, to: 0.5, outputFrom: 0, outputTo: 40 }
      - { from: 0.5, to: 0.8, outputFrom: 40, outputTo: 80 }
      - { from: 0.8, to: 1, outputFrom: 80, outputTo: 100 }

  # PLACEHOLDER: thresholds inferred without authoritative source;
  # downstream codegen MUST preserve this comment and emit a TODO in code.
  - id: RQ-3
    name: "Independent attestor coverage normalization"
    description: "Maps attestor coverage signal to a contribution."
    type: piecewise-linear
    inputUnit: "count"
    outputRange: [0, 100]
    segments:
      - { from: 0, to: 1, outputFrom: 0, outputTo: 40 }
      - { from: 1, to: 3, outputFrom: 40, outputTo: 80 }
      - { from: 3, to: 1000000, outputFrom: 80, outputTo: 100 }

  # PLACEHOLDER: thresholds inferred without authoritative source;
  # downstream codegen MUST preserve this comment and emit a TODO in code.
  - id: RQ-4
    name: "Reserve liquidity tier normalization"
    description: "Maps liquidity tier classification to a contribution."
    type: decision-table
    inputs:
      - { name: tier, type: string }
    output: { name: scoreContribution, type: number }
    cases:
      - when: { tier: "high" }
        then: 20
      - when: { tier: "medium" }
        then: 60
      - when: { tier: "low" }
        then: 100
version: 1
pipelines:
  - id: eventbrite-sync
    description: "Periodic Eventbrite feed ingestion"
    schedule: { cron: "7,37 * * * *" }
    failure: { strategy: retry-3, retries: 3, compensation: stale-feed }
    nodes:
      - { id: fetch, service: Admin Ops Service, function: syncEventbriteFeed }
      - { id: normalize, service: Admin Ops Service, function: normalizeEventbriteFeed, dependsOn: [fetch] }
      - { id: persist, service: Admin Ops Service, function: persistEventbriteFeed, dependsOn: [normalize] }
      - { id: notify, service: Messaging Service, function: emitEventbriteSyncNotice, dependsOn: [persist] }

  - id: marketing-sync
    description: "Periodic marketing sync for Mailchimp and Constant Contact"
    schedule: { cron: "12,42 * * * *" }
    failure: { strategy: retry-3, retries: 3, compensation: stale-sync }
    nodes:
      - { id: fetch, service: Admin Ops Service, function: syncMarketingProviders }
      - { id: normalize, service: Admin Ops Service, function: normalizeMarketingSync, dependsOn: [fetch] }
      - { id: persist, service: Admin Ops Service, function: persistMarketingSync, dependsOn: [normalize] }

  - id: credit-expiry-scan
    description: "Daily private lesson credit expiry sweep"
    schedule: { cron: "0 0 * * *" }
    failure: { strategy: retry-3, retries: 3, compensation: log-only }
    nodes:
      - { id: scan, service: Workforce Service, function: expireLessonCredits }

  - id: approval-lock-cleanup
    description: "Periodic cleanup of stale approval locks"
    schedule: { cron: "*/5 * * * *" }
    failure: { strategy: continue, retries: 0, compensation: release-later }
    nodes:
      - { id: scan, service: Approvals Service, function: cleanupExpiredApprovalLocks }
version: 1
pipelines:
  - id: approval-lock-release
    description: "Release expired approval locks every 60 seconds"
    schedule: { cron: "* * * * *" }
    failure: { strategy: retry-3, retries: 3, compensation: release-stale-locks }
    nodes:
      - { id: scan, service: ApprovalService, function: scanExpiredLocks }
      - { id: release, service: ApprovalService, function: releaseExpiredLocks, dependsOn: [scan] }

  - id: credit-expiry-scan
    description: "Expire lesson credits daily at 00:00 UTC"
    schedule: { cron: "0 0 * * *" }
    failure: { strategy: retry-1, retries: 1, compensation: markCreditsStale }
    nodes:
      - { id: scan, service: LessonService, function: scanExpiredCredits }
      - { id: expire, service: LessonService, function: expireCredits, dependsOn: [scan] }
      - { id: notify, service: NotificationService, function: notifyCreditExpiry, dependsOn: [expire] }

  - id: eventbrite-refresh
    description: "Refresh event feeds on demand and through sync runs"
    schedule: { cron: "17 * * * *" }
    failure: { strategy: abort, retries: 0, compensation: markFeedWarning }
    nodes:
      - { id: fetch, service: AdminService, function: refreshEventFeeds }
      - { id: persist, service: AdminService, function: persistEventFeeds, dependsOn: [fetch] }
      - { id: notify, service: NotificationService, function: notifyEventFeedRefresh, dependsOn: [persist] }
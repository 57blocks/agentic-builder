version: 1
pipelines:
  - id: daily-admin-sync
    description: "Deterministic daily synchronization and maintenance flow for admin-facing data"
    schedule: { cron: "7,37 * * * *" }
    failure: { strategy: retry-3, retries: 3, compensation: skip-cycle }
    nodes:
      - { id: fetch-eventbrite, service: Integration Service, function: syncEventbriteFeeds }
      - { id: sync-marketing, service: Integration Service, function: syncMarketingSystems, dependsOn: [fetch-eventbrite] }
      - { id: refresh-reports, service: Report Service, function: rebuildAdminAggregates, dependsOn: [sync-marketing] }
      - { id: publish-notifications, service: Notification Service, function: enqueueSyncNotifications, dependsOn: [refresh-reports] }
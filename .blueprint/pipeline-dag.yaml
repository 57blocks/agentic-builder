version: 1
pipelines:
  - id: eventbrite-sync
    description: "Scheduled Eventbrite feed refresh"
    schedule: { cron: "2,32 * * * *" }
    failure: { strategy: retry-3, retries: 3, compensation: mark-stale }
    nodes:
      - { id: fetch, service: Sync Service, function: fetchEventbriteFeeds }
      - { id: persist, service: Sync Service, function: persistEventbriteSnapshot, dependsOn: [fetch] }
      - { id: health, service: Sync Service, function: updateEventbriteFeedHealth, dependsOn: [persist] }

  - id: marketing-sync
    description: "Scheduled Mailchimp / Constant Contact refresh"
    schedule: { cron: "7,37 * * * *" }
    failure: { strategy: retry-3, retries: 3, compensation: mark-stale }
    nodes:
      - { id: fetch, service: Sync Service, function: fetchMarketingProviders }
      - { id: persist, service: Sync Service, function: persistMarketingSnapshot, dependsOn: [fetch] }
      - { id: health, service: Sync Service, function: updateMarketingSyncHealth, dependsOn: [persist] }

  - id: teacher-work-hours-monthly-closeout
    description: "Teacher submission closeout and summary rebuild"
    schedule: { cron: "0 0 1 * *" }
    failure: { strategy: abort, retries: 0, compensation: reopen-submission }
    nodes:
      - { id: lock, service: Approval Workflow Service, function: lockSubmittedWorkHours }
      - { id: summarize, service: Approval Workflow Service, function: rebuildTeacherWorkHourSummaries, dependsOn: [lock] }
      - { id: notify, service: Notification Service, function: notifyPendingReviewQueue, dependsOn: [summarize] }
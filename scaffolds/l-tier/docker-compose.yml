# L-tier docker-compose
#
# Two modes:
#   1. **Local dev** (`docker compose up`):
#      Brings up Postgres + Redis only — run backend/frontend natively
#      (`pnpm dev`) so you keep hot reload. This is the recommended flow.
#
#   2. **Full stack** (`docker compose --profile full up`):
#      Builds and runs backend + frontend images too. Matches the production
#      shape so you can sanity-check the image before pushing.
#
# Why Redis is included by default: L-tier projects routinely run BullMQ-backed
# background pipelines (aggregators, scanners, digest builders). The
# `USE_REDIS_QUEUE=1` env flag in backend tells `src/queue/` to route through
# Redis instead of the in-process EventEmitter. Without Redis in compose,
# every dev would have to spin one up by hand → friction.

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    profiles: ["full"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/app
      # CORS allowlist for the SPA served via nginx (see frontend service
      # below). When you front the API with a custom domain, replace this
      # with the public origin(s). `assertRequiredEnv()` fatal-exits in
      # production if this is empty.
      CORS_ORIGINS: http://localhost:8080
      # AUTH_JWT_SECRET MUST be supplied via an actual secret store (CI
      # var, k8s secret, Vault). The compose file is checked into git.
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET must be set in shell env or .env}
      REDIS_URL: redis://redis:6379
      # Default OFF — flip to "1" only when you actually deploy multiple
      # backend replicas. With a single replica the in-process queue is
      # faster and one fewer moving part to monitor.
      USE_REDIS_QUEUE: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # If you proxy the SPA via the same backend host (no separate nginx),
      # the health path may be `/v1/health` instead of `/api/v1/health`. The
      # default scaffold path is `/api/v1/health`, exposed by `src/api/modules`.
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
    ports:
      - "4000:4000"
    restart: unless-stopped

  frontend:
    profiles: ["full"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

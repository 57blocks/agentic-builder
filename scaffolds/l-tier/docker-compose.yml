# L-tier docker-compose
#
# Two modes:
#   1. **Local dev** (`docker compose up`):
#      Brings up Postgres + Redis only — run backend/frontend natively
#      (`pnpm dev`) so you keep hot reload. This is the recommended flow.
#
#   2. **Full stack** (`docker compose --profile full up`):
#      Builds and runs backend + frontend images too. Matches the production
#      shape so you can sanity-check the image before pushing.
#
# Why Redis is included by default: L-tier projects routinely run BullMQ-backed
# background pipelines (aggregators, scanners, digest builders). The
# `USE_REDIS_QUEUE=1` env flag in backend tells `src/queue/` to route through
# Redis instead of the in-process EventEmitter. Without Redis in compose,
# every dev would have to spin one up by hand → friction.

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    profiles: ["full"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/app
      REDIS_URL: redis://redis:6379
      # NOTE: `USE_REDIS_QUEUE=1` is a no-op until `src/queue/redisQueue.ts`
      # ships. Keep it commented out so multi-replica deploys aren't
      # misled into thinking jobs are shared across pods.
      # USE_REDIS_QUEUE: "1"
      # Frontend container talks to backend via nginx on port 80, so this
      # is the only origin that needs to be allowlisted in compose. Add
      # extra origins (preview URLs, staging) as comma-separated entries.
      CORS_ORIGINS: "http://localhost:8080"
      # AUTH_JWT_SECRET MUST be supplied via an external .env / secrets
      # manager — DO NOT bake a value in here. `assertRequiredEnv` will
      # process.exit(1) on boot if it's missing in production.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      # `/api/v1/health` is the path when the `auth-password-rbac` (or any
      # other scaffold that mounts apiRouter at `/api/v1`) overlay is
      # applied. For a bare base-only deployment the path is `/api/health`
      # — edit this line during codegen if your generated project doesn't
      # use a versioned API prefix.
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  frontend:
    profiles: ["full"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

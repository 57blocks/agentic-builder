upstream backend_upstream {
    # In docker-compose, the backend service is reachable at "backend:4000".
    # If you change the compose service name or the backend PORT, mirror it
    # here AND in docker-compose.yml.
    server backend:4000;
    keepalive 32;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy /api/* to the backend container. Without this, the SPA
    # would call /api/v1/... from the browser and hit nginx → 404 because
    # the static build only ships frontend assets, not the API.
    #
    # NOTE on path: the frontend client uses base path "" so requests are
    # `/v1/...` if API_BASE is empty, or `/api/v1/...` if you set
    # `VITE_API_BASE=/api`. The proxy location must match whatever prefix
    # the SPA actually sends. Default keeps `/api/`.
    location /api/ {
        proxy_pass http://backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# nginx config for the production frontend image.
#
# Serves the built SPA at `/` and reverse-proxies `/api/*` to the backend
# container so the same-origin URL `/api/v1/...` resolves end-to-end when
# the stack is brought up via `docker compose --profile full up`.
#
# The `backend` hostname matches the service name declared in
# `docker-compose.yml`; port 4000 matches `backend/Dockerfile#EXPOSE` and
# `backend/src/config/env.ts#PORT`.

upstream backend_upstream {
    server backend:4000;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: every unknown path falls back to index.html for client routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy — strips no prefix; the path the browser sees
    # (`/api/v1/foo`) is forwarded verbatim to the backend, which mounts
    # apiRouter at `/api/v1`.
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-running endpoints (SSE, large exports) — bump if needed.
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_buffering     off;
    }
}
